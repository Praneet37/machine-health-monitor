<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports | Machine Health Monitor</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app-layout">

    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar" id="sidebar">
        <div class="brand">
            <div class="logo-icon"><img src="{{ url_for('static', filename='assets/icons/logo.svg') }}" width="18" height="18" style="filter: invert(1);"></div>
            <span>MachineHealth</span>
        </div>
        <nav>
            <a href="{{ url_for('dashboard') }}">
                <img src="{{ url_for('static', filename='assets/icons/dashboard.svg') }}" width="18" height="18"> Dashboard
            </a>
            <a href="{{ url_for('machines_page') }}">
                <img src="{{ url_for('static', filename='assets/icons/machines.svg') }}" width="18" height="18"> Machines
            </a>
            <a href="{{ url_for('predictions_page') }}">
                <img src="{{ url_for('static', filename='assets/icons/predictions.svg') }}" width="18" height="18"> Predictions
            </a>
            <a href="{{ url_for('reports_page') }}" class="active">
                <img src="{{ url_for('static', filename='assets/icons/reports.svg') }}" width="18" height="18"> Reports
            </a>
            <a href="{{ url_for('settings_page') }}">
                <img src="{{ url_for('static', filename='assets/icons/settings.svg') }}" width="18" height="18"> Settings
            </a>
        </nav>
        <a href="{{ url_for('logout') }}" class="logout-link">
            <img src="{{ url_for('static', filename='assets/icons/logout.svg') }}" width="18" height="18"> Logout
        </a>
    </aside>

    <!-- ===================== MAIN CONTENT ===================== -->
    <main class="main-content">
        <div class="topbar">
            <div style="display:flex; align-items:center; gap:12px;">
                <button class="menu-toggle" id="menu-toggle">☰</button>
                <h2>Maintenance Reports</h2>
            </div>
            <div class="user-chip">
                <div class="avatar">{{ username[0]|upper }}</div>
                <span>{{ username }}</span>
            </div>
        </div>

        <div class="card table-card">
            <div class="reports-toolbar">
                <h3>Machine Maintenance Summary</h3>
                <button class="btn btn-sm" id="export-btn">🖨️ Print / Export</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Machine Name</th>
                        <th>Current Status</th>
                        <th>Health Score</th>
                        <th>Failure Probability</th>
                        <th>Recommended Maintenance</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="reports-tbody">
                    <tr><td colspan="6" style="text-align:center; color:#90A4AE;">Loading reports...</td></tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<script src="{{ url_for('static', filename='js/reports.js') }}"></script>
<script>
    document.getElementById("menu-toggle").addEventListener("click", () => {
        document.getElementById("sidebar").classList.toggle("open");
    });
</script>
</body>
</html>
